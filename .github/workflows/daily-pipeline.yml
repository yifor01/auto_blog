name: Daily Pipeline

on:
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = 台灣 02:00
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，空白=今天'
        required: false
      force:
        description: '強制重跑 (true/false)'
        default: 'false'

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run pipeline
        env:
          AIHUBMIX_API_URL: ${{ secrets.AIHUBMIX_API_URL }}
          AIHUBMIX_API_KEY_1: ${{ secrets.AIHUBMIX_API_KEY_1 }}
          AIHUBMIX_API_KEY_2: ${{ secrets.AIHUBMIX_API_KEY_2 }}
          AIHUBMIX_API_KEY_3: ${{ secrets.AIHUBMIX_API_KEY_3 }}
          AIHUBMIX_API_KEY_4: ${{ secrets.AIHUBMIX_API_KEY_4 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          FORCE="${{ github.event.inputs.force }}"
          CMD="python -m src.cli run"
          [ -n "$DATE" ] && CMD="$CMD --date $DATE"
          [ "$FORCE" = "true" ] && CMD="$CMD --force"
          $CMD

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/scored/ data/bookmarks.json output/posts/ output/digests/ output/blogs/
          git diff --cached --quiet || git commit -m "chore: pipeline $(date -u +%Y-%m-%d)"
          git push
