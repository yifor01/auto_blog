name: Monthly Cleanup

on:
  schedule:
    - cron: '0 0 1 * *'   # 每月 1 號 UTC 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Clean old data
        run: python -m src.cli clean --keep-days 90 --auto

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/ output/
          git diff --cached --quiet || git commit -m "chore: cleanup data older than 90 days"
          git push
