llm:
  api_url: https://aihubmix.com/v1
  model: gpt-4.1-free
  fallback_model: glm-4.7-flash-free
  generation_model: gpt-4o-free
  generation_fallback_model: gemini-3-flash-preview-free
  max_tokens: 8192
  request_delay_seconds: 4.0
  # Provider-level fallback：aihubmix 全部 429 時自動切換
  openrouter_fallback:
    api_url: https://openrouter.ai/api/v1
    model: nvidia/nemotron-3-super-120b-a12b:free
    generation_model: nvidia/nemotron-3-super-120b-a12b:free
collectors:
  arxiv:
    enabled: true
    categories:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.CV
    max_results: 50
  chatpaper:
    enabled: true
    base_url: https://chatpaper.com/api/v1/articles/list
    categories:
    - id: 2
      name: AI
    - id: 3
      name: Computation and Language
    - id: 4
      name: Computer Vision and Pattern Recognition
    - id: 91
      name: Information Retrieval
    page_size: 30
  hf_papers:
    enabled: true
  rss:
    enabled: true
    feeds:
    - name: TechCrunch AI
      url: https://techcrunch.com/category/artificial-intelligence/feed/
    - name: The Verge AI
      url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    - name: OpenAI Blog
      url: https://openai.com/blog/rss.xml
    - name: Google AI Blog
      url: https://blog.google/technology/ai/rss/
    - name: HN AI
      url: https://hnrss.org/newest?q=AI+LLM+GPT+agent
      max_age_hours: 24
    - name: HuggingFace Blog
      url: https://huggingface.co/blog/feed.xml
    - name: Google Research
      url: https://blog.research.google/feeds/posts/default
    - name: MarkTechPost
      url: https://www.marktechpost.com/feed/
    - name: VentureBeat AI
      url: https://venturebeat.com/category/ai/feed/
    - name: KDnuggets
      url: https://www.kdnuggets.com/feed
    - name: Anthropic Engineering
      url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml
    - name: Anthropic Research
      url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_research.xml
  blogs:
    enabled: true
    sources:
    - name: Naval Ravikant
      url: https://nav.al/
    - name: Andrej Karpathy
      url: https://karpathy.github.io/
    - name: 寶玉 baoyu.io
      url: https://baoyu.io/
    - name: Lilian Weng (OpenAI)
      url: https://lilianweng.github.io/
    - name: Jay Alammar
      url: https://jalammar.github.io/
    - name: Sebastian Raschka
      url: https://magazine.sebastianraschka.com/
    - name: Simon Willison
      url: https://simonwillison.net/
    - name: Chip Huyen
      url: https://huyenchip.com/blog/
    - name: Eugene Yan
      url: https://eugeneyan.com/
    - name: Hamel Husain
      url: https://hamel.dev/
    - name: Latent Space
      url: https://www.latent.space/
  hackernews:
    enabled: true
    queries:
    - AI
    - LLM
    - GPT
    - RAG
    - Agent
    - OpenAI
    - DeepMind
    - Anthropic
    - Claude
    - Gemini
    - transformer
    - Cursor
    min_points: 50
    max_results: 30
  github:
    enabled: true
    languages:
    - python
    - typescript
    - rust
  reddit:
    enabled: true
    subreddits:
    - LocalLLaMA
    - MachineLearning
    - artificial
    - ChatGPT
    - OpenAI
    - Anthropic
    - StableDiffusion
    min_upvotes: 50
    max_results: 30
    time_filter: day
  newsapi:
    enabled: true
    query: generative AI OR LLM OR large language model OR AI agent OR OpenAI OR Anthropic OR Claude OR Gemini OR GPT OR DeepSeek OR Qwen
    language: en
    max_results: 30
    sort_by: relevancy
