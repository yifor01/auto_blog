  github_stars_high: 100
  github_stars_medium: 50
  source_weights:
    arxiv: 0
    chatpaper: 5
    hf_papers: 0
    rss: 15
    blog: 15
    github: 0
    hackernews: 0
    reddit: 0
    newsapi: 15
